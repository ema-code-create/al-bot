name: AL Daily Tweet

on:
  schedule:
    # JST 5:00 / 7:00 / 10:00 / 12:00 / 15:00 / 18:00 / 21:00 / 23:00 (UTC-9)
    - cron: "0 20 * * *"  # JST 05:00
    - cron: "0 22 * * *"  # JST 07:00
    - cron: "0  1 * * *"  # JST 10:00
    - cron: "0  3 * * *"  # JST 12:00
    - cron: "0  6 * * *"  # JST 15:00
    - cron: "0  9 * * *"  # JST 18:00
    - cron: "0 12 * * *"  # JST 21:00
    - cron: "0 14 * * *"  # JST 23:00
  workflow_dispatch: # 手動実行も可能

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tweepy

      - name: Post tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python tweet.py
